<!-- AULA 02 -->
<div class="aula">

<h2>Aula 02 – Estrutura textual: retrospectiva ENEM</h2>

<div class="video-material">

<iframe
src="https://www.youtube.com/embed/5xx1QOVBl_k?si=Sbm2avoh0H_QBvIT"
allowfullscreen>
</iframe>

<iframe
src="Estrutura_textual_Retrospectiva_ENEM_cartilha_com_os_melhores_textos_das_últimas_edições(com_base_na_régua_do_curso).pdf">
</iframe>

</div>

<div class="checkbox">
<label>
<input type="checkbox" id="mod1_aula2">
Aula assistida
</label>
</div>

</div>


<p><a href="redacao_2025.html">⬅ Voltar aos módulos</a></p>


<script>

document.addEventListener("DOMContentLoaded", function(){

function salvar(id){
let el=document.getElementById(id)
localStorage.setItem(id,el.checked)
}

function carregar(id){
let el=document.getElementById(id)
if(localStorage.getItem(id)=="true"){
el.checked=true
}
}

carregar("mod1_aula1")
carregar("mod1_aula2")

document.getElementById("mod1_aula1").addEventListener("change",()=>salvar("mod1_aula1"))
document.getElementById("mod1_aula2").addEventListener("change",()=>salvar("mod1_aula2"))

})

</script>

</body>
