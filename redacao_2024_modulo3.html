<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>MÓDULO 03 – ANÁLISE DE REDAÇÕES</title>

<link rel="stylesheet" href="style.css">

<style>

.conteudo{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:10px;
}

.checks{
margin-bottom:40px;
}

</style>

</head>

<body>

<h1>MÓDULO 03 – ANÁLISE DE REDAÇÕES</h1>


<h2>Aula 01 – Análise de Redações ★★★★★</h2>


<div class="conteudo">

<iframe
width="640"
height="360"
src="https://www.youtube.com/embed/ALZucnoU7K4?si=iaDqoedyHHWdpqbH"
allowfullscreen>
</iframe>

</div>


<div class="checks">

<label>
<input type="checkbox" id="m3_aula1_assistida">
Aula assistida
</label>
<br>

<label>
<input type="checkbox" id="m3_aula1_revisao">
Revisão
</label>
<br>

<label>
<input type="checkbox" id="m3_aula1_exercicio">
Exercício
</label>

</div>


<button onclick="location.href='#aula2'">
Próxima aula →
</button>


<p>
<a href="redacao_2024.html">⬅ Voltar aos módulos</a>
</p>


<script>

document.addEventListener("DOMContentLoaded", function(){

const ids=[

"m3_aula1_assistida",
"m3_aula1_revisao",
"m3_aula1_exercicio"

]

ids.forEach(id=>{

const el=document.getElementById(id)

if(localStorage.getItem(id)==="true"){
el.checked=true
}

el.addEventListener("change",function(){
localStorage.setItem(id,el.checked)
})

})

})

</script>

</body>
</html>
