<p><a href="redacao_2025.html">⬅ Voltar aos módulos</a></p>


<script>

document.addEventListener("DOMContentLoaded", function(){

function salvar(id){
let el=document.getElementById(id)
localStorage.setItem(id,el.checked)
}

function carregar(id){
let el=document.getElementById(id)
if(localStorage.getItem(id)=="true"){
el.checked=true
}
}

for(let i=1;i<=3;i++){

let id="mod1_aula"+i
let el=document.getElementById(id)

if(el){
carregar(id)
el.addEventListener("change",()=>salvar(id))
}

}

})

</script>
