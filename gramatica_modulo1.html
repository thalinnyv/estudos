<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>MÓDULO 01 – ORTOGRAFIA</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#1d4ed8,#2563eb);
margin:0;
padding:40px;
}

/* CAIXA BRANCA */
.container{
background:white;
padding:30px;
border-radius:12px;
max-width:1200px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* TÍTULO */
h1{
margin-bottom:40px;
}

/* BLOCO DA AULA */
.aula{
margin-bottom:60px;
border-bottom:1px solid #ddd;
padding-bottom:30px;
}

/* VIDEO + PDF */
.video-material{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:15px;
}

/* TAMANHO DOS IFRAMES */
.video-material iframe{
flex:1;
min-width:400px;
height:360px;
border-radius:8px;
}

/* CHECKBOXES */
.checkboxes{
margin-top:15px;
display:flex;
flex-direction:column;
gap:8px;
font-size:16px;
}

</style>

</head>
<body>

<div class="container">

<h1>MÓDULO 01 – ORTOGRAFIA</h1>


<!-- AULA 01 -->
<div class="aula">

<h2>Aula 01 – Problemas da norma culta ★★★★★</h2>

<div class="video-material">

<iframe src="https://www.youtube.com/embed/t-lMi7WVOnc?si=zTvvhdWkl78WuY04" allowfullscreen></iframe>

<iframe src="problemas_norma_culta.pdf"></iframe>

</div>

<div class="checkboxes">

<label><input type="checkbox" id="aula1_video"> Aula assistida</label>

<label><input type="checkbox" id="aula1_revisao"> Revisão</label>

<label><input type="checkbox" id="aula1_exercicio"> Exercício</label>

</div>

</div>


<!-- AULA 02 -->
<div class="aula">

</div>

<div class="checkboxes">

<label><input type="checkbox" id="aula2_video"> Aula assistida</label>

<label><input type="checkbox" id="aula2_revisao"> Revisão</label>

<label><input type="checkbox" id="aula2_exercicio"> Exercício</label>

</div>

<p><a href="redacao_2025.html">⬅ Voltar aos módulos</a></p>

</div>


<script>

document.addEventListener("DOMContentLoaded", function(){

let caixas=document.querySelectorAll("input[type=checkbox]")

caixas.forEach(function(box){

let id=box.id

if(localStorage.getItem(id)==="true"){
box.checked=true
}

box.addEventListener("change",function(){
localStorage.setItem(id,box.checked)
})

})

})

</script>

</body>
</html>
