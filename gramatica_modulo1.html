<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÓDULO 01 – ORTOGRAFIA</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #0000FF; /* FUNDO AZUL */
        }

        .aula {
            background-color: #FFFFFF; /* Fundo branco para cada aula */
            padding: 20px;
            margin-bottom: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .video-material {
            display: flex;
            gap: 20px;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .caixa {
            flex: 1;
            aspect-ratio: 16 / 9;
            background-color: #eee; /* Fundo reserva caso o vídeo falhe */
        }

        .caixa iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 4px;
        }

        .checkboxes {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .checkboxes label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
            color: #000000 !important; /* TEXTO PRETO PARA FICAR VISÍVEL */
            font-weight: bold;
        }

        .checkboxes input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
        }

        h1 { 
            color: #FFFFFF; /* Título do módulo em branco sobre o azul */
            text-align: center;
            margin-bottom: 30px;
        }

        h2 { 
            color: #333; 
            border-bottom: 2px solid #eee; 
            padding-bottom: 10px; 
        }

        .voltar { 
            margin-top: 30px; 
            display: inline-block; 
            text-decoration: none; 
            color: #FFFFFF; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>MÓDULO 01 – ORTOGRAFIA</h1>

    <div class="aula">
        <h2>Aula 01 – Problemas da norma culta ★★★★★</h2>
        
        <div class="video-material">
            <div class="caixa">
                <iframe src="https://www.youtube.com/embed/t-lMi7WVOnc?si=zTvvhdWkl78WuY04" allowfullscreen></iframe>
            </div>
            <div class="caixa">
                <iframe src="problemas_norma_culta.pdf" allowfullscreen></iframe>
            </div>
        </div>

        <div class="checkboxes">
            <label><input type="checkbox" id="aula1_check1"> Aula assistida</label>
            <label><input type="checkbox" id="aula1_check2"> Revisão</label>
            <label><input type="checkbox" id="aula1_check3"> Exercício</label>
        </div>
    </div>

    <div class="aula">
        <h2>Aula 02 – Acentuação gráfica ★★★★☆</h2>
        
        <div class="video-material">
            <div class="caixa">
                <iframe src="https://www.youtube.com/embed/f78PRm6tCkA?si=qgYraxcFDJeq8F8d" allowfullscreen></iframe>
            </div>
            <div class="caixa">
                <iframe src="" allowfullscreen></iframe>
            </div>
        </div>

        <div class="checkboxes">
            <label><input type="checkbox" id="aula2_check1"> Aula assistida</label>
            <label><input type="checkbox" id="aula2_check2"> Revisão</label>
            <label><input type="checkbox" id="aula2_check3"> Exercício</label>
        </div>
    </div>

    <div class="aula">
        <h2>Aula 03 – Uso do hífen ★★☆☆☆</h2>
        
        <div class="video-material">
            <div class="caixa">
                <iframe src="https://www.youtube.com/embed/4lgw1iqAqt0?si=v60_UtDV51dIaOVK" allowfullscreen></iframe>
            </div>
            <div class="caixa">
                <iframe src="uso_hífen.pdf" allowfullscreen></iframe>
            </div>
        </div>

        <div class="checkboxes">
            <label><input type="checkbox" id="aula3_check1"> Aula assistida</label>
            <label><input type="checkbox" id="aula3_check2"> Revisão</label>
            <label><input type="checkbox" id="aula3_check3"> Exercício</label>
        </div>
    </div>

    <a href="redacao_2025.html" class="voltar">⬅ Voltar aos módulos</a>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');

            checkboxes.forEach(checkbox => {
                // Carregar estado salvo
                const saved = localStorage.getItem(checkbox.id);
                if (saved === "true") checkbox.checked = true;

                // Salvar ao clicar
                checkbox.addEventListener('change', () => {
                    localStorage.setItem(checkbox.id, checkbox.checked);
                });
            });
        });
    </script>

</body>
</html>
